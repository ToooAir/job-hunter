services:

  # ── Phase 1 + 2 daily scheduler ──────────────────────────────────────────────
  pipeline:
    build: .
    image: job-hunter-app:latest        # tag the built image so dashboard can reuse it
    command: python scheduler.py        # interval-based catch-up (PIPELINE_MIN_INTERVAL_HOURS, default 20h)
    env_file: .env
    environment:
      - TZ=Europe/Berlin
    volumes:
      - ./data:/app/data                 # SQLite DB
      - ./qdrant_data:/app/qdrant_data   # Qdrant vectors
      - ./candidate_kb:/app/candidate_kb # résumé KB — edit locally, no rebuild needed
      - ./config:/app/config             # search_targets.yaml
      - ./logs:/app/logs
    restart: unless-stopped

  # ── Phase 3 Streamlit dashboard ──────────────────────────────────────────────
  dashboard:
    image: job-hunter-app:latest        # reuses the image built by pipeline — no second build
    command: >
      streamlit run phase3_dashboard.py
      --server.address=0.0.0.0
      --server.headless=true
      --server.port=8501
    env_file: .env
    environment:
      # MUST match apply_api: the answer-panel focus TTL compares naive local
      # timestamps written here against now() there — a TZ mismatch (UTC vs
      # Berlin = exactly 2 h in summer) would expire every focus on arrival.
      - TZ=Europe/Berlin
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./qdrant_data:/app/qdrant_data
      - ./candidate_kb:/app/candidate_kb
      - ./config:/app/config
      - ./logs:/app/logs
    restart: unless-stopped
    depends_on:
      - pipeline

  # ── Phase 1 (extension) autofill sidecar ─────────────────────────────────────
  # Token-gated API the browser extension talks to. Published on host-loopback
  # ONLY (127.0.0.1) because it serves the CV + personal data; needs
  # APPLY_API_TOKEN in .env. See extension/PHASE1_PLAN.md.
  apply_api:
    image: job-hunter-app:latest        # reuses the pipeline-built image
    command: uvicorn apply_api:app --host 0.0.0.0 --port 8531
    env_file: .env
    environment:
      - TZ=Europe/Berlin
    ports:
      - "127.0.0.1:8531:8531"           # host-loopback only — never 0.0.0.0
    volumes:
      - ./data:/app/data
      - ./candidate_kb:/app/candidate_kb # CV lives here
    restart: unless-stopped
    depends_on:
      - pipeline
